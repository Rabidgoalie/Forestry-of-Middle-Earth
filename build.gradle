buildscript {
    repositories {
        mavenCentral()
        maven { url = "https://maven.minecraftforge.net/" }
        maven { url = "https://anatawa12.com" }
    }
    dependencies {
        // Lock the plugin version securely
        classpath 'com.anatawa12.forge:ForgeGradle:1.2-1.0.12'
    }
}

apply plugin: 'forge'

version = "1.0.0"
group = "forestryofmiddleearth"
archivesBaseName = "forestrylotr"

sourceCompatibility = targetCompatibility = '1.8'

compileJava {
    options.compilerArgs << "-source" << "1.8" << "-target" << "1.8"
}

minecraft {
    version = "1.7.10-10.13.4.1614-1.7.10"
    runDir = "run"
}

repositories {
    mavenCentral()
}

dependencies {
    // Inject your deobfuscated development environment dependencies
    compile files("libs/Forestry.jar")
    compile files("libs/LOTR.jar")
}
